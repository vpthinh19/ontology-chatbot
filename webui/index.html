<!DOCTYPE html>
<!-- Coding By CodingNepal - youtube.com/@codingnepal -->
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NTU Academic Chatbot</title>
    <!-- Linking Google Fonts For Icons -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@32,400,0,0" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        :root {
            /* Dark theme colors */
            --text-color: #edf3ff;
            --subheading-color: #97a7ca;
            --placeholder-color: #c3cdde;
            --primary-color: #101623;
            --secondary-color: #283045;
            --secondary-hover-color: #333e58;
            --scrollbar-color: #626a7f;
        }

        body.light-theme {
            /* Light theme colors */
            --text-color: #090c13;
            --subheading-color: #7b8cae;
            --placeholder-color: #606982;
            --primary-color: #f3f7ff;
            --secondary-color: #dce6f9;
            --secondary-hover-color: #d2ddf2;
            --scrollbar-color: #a2aac2;
        }

        body {
            color: var(--text-color);
            background: var(--primary-color);
        }

        .container {
            overflow-y: auto;
            padding: 32px 0 60px;
            height: calc(100vh - 127px);
            scrollbar-color: var(--scrollbar-color) transparent;
        }

        .container :where(.app-header, .message, .prompt-wrapper) {
            position: relative;
            margin: 0 auto;
            width: 100%;
            padding: 0 20px;
            max-width: 990px;
        }

        .container .app-header {
            margin-top: 3vh;
        }

        .app-header .heading {
            width: fit-content;
            font-size: 3rem;
            background: linear-gradient(to right, #1d7efd, #8f6fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .app-header .sub-heading {
            font-size: 2.6rem;
            margin-top: -5px;
            color: var(--subheading-color);
        }

        body.chats-active .container .app-header {
            display: none;
        }

        .container .chats-container {
            display: flex;
            gap: 20px;
            flex-direction: column;
        }

        .chats-container .message {
            display: flex;
            gap: 11px;
            align-items: center;
        }

        .chats-container .message .avatar {
            width: 43px;
            height: 43px;
            flex-shrink: 0;
            align-self: flex-start;
            border-radius: 50%;
            padding: 6px;
            margin-right: -7px;
            background: var(--secondary-color);
            border: 1px solid var(--secondary-hover-color);
        }

        .chats-container .message.loading .avatar {
            animation: rotate 3s linear infinite;
        }

        @keyframes rotate {
            100% {
                transform: rotate(360deg);
            }
        }

        .chats-container .message .message-text {
            padding: 3px 16px;
            word-wrap: break-word;
            overflow-wrap: anywhere;
            white-space: pre-line;
            line-height: 1.55;
        }

        .chats-container .message .message-text a {
            color: #1d7efd;
            text-decoration: underline;
            word-break: break-word;
        }

        .chats-container .message .message-text a:hover {
            color: #0264e3;
        }

        .chats-container .bot-message {
            margin: 9px auto;
        }

        .chats-container .user-message {
            flex-direction: column;
            align-items: flex-end;
        }

        .chats-container .user-message .message-text {
            padding: 12px 16px;
            max-width: 75%;
            background: var(--secondary-color);
            border-radius: 13px 13px 3px 13px;
        }

        .container .prompt-container {
            position: fixed;
            width: 100%;
            left: 0;
            bottom: 0;
            padding: 16px 0;
            background: var(--primary-color);
        }

        .prompt-container :where(.prompt-wrapper, .prompt-form, .prompt-actions) {
            display: flex;
            gap: 12px;
            height: 56px;
            align-items: center;
        }

        .prompt-container .prompt-form {
            height: 100%;
            width: 100%;
            border-radius: 130px;
            background: var(--secondary-color);
        }

        .prompt-form .prompt-input {
            width: 100%;
            height: 100%;
            background: none;
            outline: none;
            border: none;
            font-size: 1rem;
            color: var(--text-color);
            padding-left: 24px;
        }

        .prompt-form .prompt-input::placeholder {
            color: var(--placeholder-color);
        }

        .prompt-wrapper button {
            width: 56px;
            height: 100%;
            flex-shrink: 0;
            cursor: pointer;
            border-radius: 50%;
            font-size: 1.4rem;
            border: none;
            color: var(--text-color);
            background: var(--secondary-color);
            transition: 0.3s ease;
        }

        .prompt-wrapper button:hover {
            background: var(--secondary-hover-color);
        }

        .prompt-form .prompt-actions {
            gap: 5px;
            margin-right: 7px;
        }

        .prompt-wrapper .prompt-form button {
            position: relative;
            height: 45px;
            width: 45px;
        }

        .prompt-form .prompt-actions #send-prompt-btn {
            color: #fff;
            display: none;
            background: #1d7efd;
        }

        .prompt-form .prompt-input:valid~.prompt-actions #send-prompt-btn {
            display: block;
        }

        .prompt-form #send-prompt-btn:hover {
            background: #0264e3;
        }

        .prompt-form #stop-response-btn:hover {
            color: #d62939;
        }

        .prompt-form #stop-response-btn {
            display: none;
        }

        body.bot-responding .prompt-form #stop-response-btn {
            display: block;
        }

        /* Responsive media query code for small screens */
        @media (max-width: 768px) {
            .container {
                padding: 20px 0 100px;
            }

            .app-header :is(.heading, .sub-heading) {
                font-size: 2rem;
                line-height: 1.4;
            }

            .app-header .sub-heading {
                font-size: 1.7rem;
            }

            .container .chats-container {
                gap: 15px;
            }

            .chats-container .bot-message {
                margin: 4px auto;
            }

            .prompt-container :where(.prompt-wrapper, .prompt-form, .prompt-actions) {
                gap: 8px;
                height: 53px;
            }

            .prompt-container button {
                width: 53px;
            }

            .prompt-form button {
                height: 42px;
                width: 42px;
            }

            .prompt-form .prompt-input {
                padding-left: 20px;
            }

            .prompt-wrapper.hide-controls :where(#theme-toggle-btn, #delete-chats-btn) {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- App Header -->
        <header class="app-header">
            <h1 class="heading">Xin chào</h1>
            <h4 class="sub-heading">Mình có thể giúp gì cho bạn?</h4>
        </header>
        <!-- Chats -->
        <div class="chats-container"></div>
        <!-- Prompt Input -->
        <div class="prompt-container">
            <div class="prompt-wrapper">
                <form action="#" class="prompt-form">
                    <input type="text" placeholder="Nhập câu hỏi..." class="prompt-input" required />
                    <div class="prompt-actions">
                        <!-- Send Prompt and Stop Response Buttons -->
                        <button id="stop-response-btn" type="button"
                            class="material-symbols-rounded">stop_circle</button>
                        <button id="send-prompt-btn" class="material-symbols-rounded">arrow_upward</button>
                    </div>
                </form>
                <!-- Theme and Delete Chats Buttons -->
                <button id="theme-toggle-btn" class="material-symbols-rounded">light_mode</button>
                <button id="delete-chats-btn" class="material-symbols-rounded">delete</button>
            </div>
        </div>
    </div>
    <script>
        const container = document.querySelector(".container");
        const chatsContainer = document.querySelector(".chats-container");
        const promptForm = document.querySelector(".prompt-form");
        const promptInput = promptForm.querySelector(".prompt-input");
        const themeToggleBtn = document.querySelector("#theme-toggle-btn");
        // API Setup — local FastAPI backend
        const API_URL = "/chat";
        let controller;
        const chatHistory = [];
        const userData = { message: "" };
        // Set initial theme from local storage
        const isLightTheme = localStorage.getItem("themeColor") === "light_mode";
        document.body.classList.toggle("light-theme", isLightTheme);
        themeToggleBtn.textContent = isLightTheme ? "dark_mode" : "light_mode";
        // Function to create message elements
        const createMessageElement = (content, ...classes) => {
            const div = document.createElement("div");
            div.classList.add("message", ...classes);
            div.innerHTML = content;
            return div;
        };
        // Scroll to the bottom of the container
        const scrollToBottom = () => container.scrollTo({ top: container.scrollHeight, behavior: "smooth" });
        // Convert plain text with markdown-style links and newlines into safe
        // HTML. URLs in the form [label](url) become anchor tags; bare http(s)
        // URLs are auto-linked; everything else is HTML-escaped to prevent
        // injection.
        const escapeHtml = (s) => s
            .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
        const renderRichText = (text) => {
            const PLACEHOLDER = "␀LINK␀";
            const links = [];
            // 1) extract markdown links so their inner HTML survives escaping.
            //    The URL group allows one level of balanced parens — needed
            //    because some upstream PDF URLs contain literal "(YYYY)" or
            //    "(N)" segments. Backend also percent-encodes parens; this
            //    regex is defense-in-depth against any URL that slips through
            //    without encoding.
            let pre = text.replace(
                /\[([^\]]+)\]\((https?:\/\/(?:\([^)]*\)|[^()\s])+)\)/g,
                (_, label, url) => {
                    links.push(`<a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(label)}</a>`);
                    return PLACEHOLDER;
                });
            // 2) escape the rest
            pre = escapeHtml(pre);
            // 3) auto-link bare URLs (post-escape so the http// chars survived)
            pre = pre.replace(/(https?:\/\/[^\s<]+)/g,
                (m) => `<a href="${m}" target="_blank" rel="noopener noreferrer">${m}</a>`);
            // 4) restore markdown links
            let i = 0;
            pre = pre.replace(new RegExp(PLACEHOLDER, "g"), () => links[i++]);
            // 5) newlines → <br>
            return pre.replace(/\n/g, "<br>");
        };
        // Render the bot reply immediately as rich HTML — no typing
        // animation. The chatbot is fast enough that incremental reveal
        // becomes a delay rather than a delight.
        const renderReply = (text, textElement, botMsgDiv) => {
            textElement.innerHTML = renderRichText(text);
            botMsgDiv.classList.remove("loading");
            document.body.classList.remove("bot-responding");
            scrollToBottom();
        };
        // Call the local FastAPI /chat endpoint and stream the reply.
        const generateResponse = async (botMsgDiv) => {
            const textElement = botMsgDiv.querySelector(".message-text");
            controller = new AbortController();
            chatHistory.push({ role: "user", text: userData.message });
            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: userData.message }),
                    signal: controller.signal,
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.detail || "Server error");
                const responseText = (data.reply || "").trim();
                renderReply(responseText, textElement, botMsgDiv);
                chatHistory.push({ role: "bot", text: responseText });
            } catch (error) {
                textElement.textContent = error.name === "AbortError" ? "Đã dừng phản hồi." : error.message;
                textElement.style.color = "#d62939";
                botMsgDiv.classList.remove("loading");
                document.body.classList.remove("bot-responding");
                scrollToBottom();
            }
        };
        // Handle the form submission
        const handleFormSubmit = (e) => {
            e.preventDefault();
            const userMessage = promptInput.value.trim();
            if (!userMessage || document.body.classList.contains("bot-responding")) return;
            userData.message = userMessage;
            promptInput.value = "";
            document.body.classList.add("chats-active", "bot-responding");
            const userMsgDiv = createMessageElement(`<p class="message-text"></p>`, "user-message");
            userMsgDiv.querySelector(".message-text").textContent = userData.message;
            chatsContainer.appendChild(userMsgDiv);
            scrollToBottom();
            setTimeout(() => {
                const botMsgHTML = `<span class="avatar material-symbols-rounded" style="display:flex;align-items:center;justify-content:center;color:#1d7efd;">school</span> <p class="message-text">Đang tra cứu...</p>`;
                const botMsgDiv = createMessageElement(botMsgHTML, "bot-message", "loading");
                chatsContainer.appendChild(botMsgDiv);
                scrollToBottom();
                generateResponse(botMsgDiv);
            }, 600);
        };
        // Stop Bot Response
        document.querySelector("#stop-response-btn").addEventListener("click", () => {
            controller?.abort();
            chatsContainer.querySelector(".bot-message.loading")?.classList.remove("loading");
            document.body.classList.remove("bot-responding");
        });
        // Toggle dark/light theme
        themeToggleBtn.addEventListener("click", () => {
            const isLightTheme = document.body.classList.toggle("light-theme");
            localStorage.setItem("themeColor", isLightTheme ? "light_mode" : "dark_mode");
            themeToggleBtn.textContent = isLightTheme ? "dark_mode" : "light_mode";
        });
        // Delete all chats
        document.querySelector("#delete-chats-btn").addEventListener("click", () => {
            chatHistory.length = 0;
            chatsContainer.innerHTML = "";
            document.body.classList.remove("chats-active", "bot-responding");
        });
        promptForm.addEventListener("submit", handleFormSubmit);
    </script>
</body>

</html>
