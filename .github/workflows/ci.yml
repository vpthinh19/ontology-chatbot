name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: vpt19/ontchatbot

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install dependencies (train extras + dev)
        run: uv sync --frozen --extra train --dev

      - name: Run tests
        run: uv run pytest -q

  check-version:
    name: Detect version bump
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.detect.outputs.version }}
      should_release: ${{ steps.detect.outputs.should_release }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: detect
        name: Compare pyproject version with latest git tag
        run: |
          VERSION=$(grep -m1 '^version = ' pyproject.toml | sed -E 's/version *= *"(.+)"/\1/')
          LATEST_TAG=$(git tag --sort=-version:refname | head -n1)
          echo "pyproject version: $VERSION"
          echo "latest git tag   : ${LATEST_TAG:-<none>}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ "v$VERSION" = "$LATEST_TAG" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Version $VERSION already tagged — skipping release"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Version $VERSION is new — proceeding to release"
          fi

  release:
    name: Build, scan, push, tag
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: vpt19
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: model
        name: Resolve HF Hub model revision
        run: |
          REVISION=$(curl -sf https://huggingface.co/api/models/vpthinh19/phobert-base-v2 | jq -r .sha)
          if [ -z "$REVISION" ] || [ "$REVISION" = "null" ]; then
            echo "::error::Failed to resolve HF Hub revision"
            exit 1
          fi
          echo "revision=$REVISION" >> "$GITHUB_OUTPUT"
          echo "::notice::Baking model revision $REVISION"

      - name: Build image (load for scan)
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE }}:${{ env.VERSION }}
          build-args: |
            MODEL_REVISION=${{ steps.model.outputs.revision }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan (OS only)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ env.VERSION }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          vuln-type: os
          ignore-unfixed: true

      - name: Push image
        run: |
          docker tag ${{ env.IMAGE }}:${{ env.VERSION }} ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ env.VERSION }}
          docker push ${{ env.IMAGE }}:latest

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          generate_release_notes: true
          body: |
            Docker image: `${{ env.IMAGE }}:${{ env.VERSION }}`
            Baked model revision: [`${{ steps.model.outputs.revision }}`](https://huggingface.co/vpthinh19/phobert-base-v2/commit/${{ steps.model.outputs.revision }})

            Pull:
            ```
            docker pull ${{ env.IMAGE }}:${{ env.VERSION }}
            docker run -p 8000:8000 ${{ env.IMAGE }}:${{ env.VERSION }}
            ```
