name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: vpt19/ontchatbot

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      # Tests chỉ đụng lõi ontology (owlready2/ctranslate2/sentencepiece) — KHÔNG cần torch/
      # FlagEmbedding/transformers. Dùng `--extra inference` (= đúng bộ deps image deploy) để CI
      # nhẹ + chắc: tránh tải torch cu130 (~3.5GB) trên runner CPU, đồng thời xác nhận lõi import
      # đủ chạy chỉ với deps inference. (Nếu sau này thêm test cần train extra thì đổi lại.)
      - name: Install dependencies (inference extra + dev)
        run: uv sync --frozen --extra inference --dev

      - name: Run tests
        run: uv run pytest -q

  check-version:
    name: Detect version bump
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.detect.outputs.version }}
      should_release: ${{ steps.detect.outputs.should_release }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - id: detect
        name: Release only if pyproject version is not yet tagged
        run: |
          VERSION=$(grep -m1 '^version = ' pyproject.toml | sed -E 's/version *= *"(.+)"/\1/')
          echo "pyproject version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # So theo SỰ TỒN TẠI của tag (không so với 'tag mới nhất') — bất biến với việc repo
          # lẫn nhiều kiểu tag (v1, v0.1.0…); chỉ release khi version này CHƯA có tag.
          if git rev-parse "refs/tags/v$VERSION" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag v$VERSION đã tồn tại — bỏ qua release (bump version trong pyproject.toml để phát hành)"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Version $VERSION chưa có tag — tiến hành build + release"
          fi

  release:
    name: Build, scan, push, tag
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: vpt19
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: model
        name: Resolve HF Hub model revision (CT2 model bartpho-ontology)
        run: |
          REVISION=$(curl -sf https://huggingface.co/api/models/vpthinh19/bartpho-ontology | jq -r .sha)
          if [ -z "$REVISION" ] || [ "$REVISION" = "null" ]; then
            echo "::error::Failed to resolve HF Hub revision (đã upload model CT2 lên HF chưa?)"
            exit 1
          fi
          echo "revision=$REVISION" >> "$GITHUB_OUTPUT"
          echo "::notice::Baking CT2 model revision $REVISION"

      - name: Build image (load for scan)
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE }}:${{ env.VERSION }}
          build-args: |
            HF_REPO=vpthinh19/bartpho-ontology
            HF_REVISION=${{ steps.model.outputs.revision }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan (OS only)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ env.VERSION }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          vuln-type: os
          ignore-unfixed: true

      - name: Push image
        run: |
          docker tag ${{ env.IMAGE }}:${{ env.VERSION }} ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ env.VERSION }}
          docker push ${{ env.IMAGE }}:latest

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          generate_release_notes: true
          body: |
            Docker image: `${{ env.IMAGE }}:${{ env.VERSION }}`
            Baked CT2 model revision: [`${{ steps.model.outputs.revision }}`](https://huggingface.co/vpthinh19/bartpho-ontology/commit/${{ steps.model.outputs.revision }})

            Pull:
            ```
            docker pull ${{ env.IMAGE }}:${{ env.VERSION }}
            docker run -p 8000:8000 ${{ env.IMAGE }}:${{ env.VERSION }}
            ```
