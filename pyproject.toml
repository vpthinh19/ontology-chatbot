[project]
name = "ont-chatbot"
version = "0.0.1"
description = "Vietnamese multi-label academic procedure classification — PhoBERT fine-tuning"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "torch",
    "transformers",
    "scikit-learn",
    "datasets",
    "matplotlib",
    "umap-learn",
    "seaborn",
    "underthesea",
    "accelerate",
    "onnx",
    "onnxruntime",
    "onnxscript"
]

[project.scripts]
train = "src.scripts.train:main"
evaluate = "src.scripts.evaluate:main"
export-onnx = "src.scripts.export_onnx:main"

[[tool.uv.index]]
name = "pytorch-cu130"
url = "https://download.pytorch.org/whl/cu130"
explicit = true

[tool.uv.sources]
torch = { index = "pytorch-cu130" }

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-cov>=6.1.1",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
filterwarnings = [
    "error::UserWarning",
    "ignore::DeprecationWarning:transformers.*",
    "ignore::FutureWarning:transformers.*",
    "ignore::FutureWarning:huggingface_hub.*",
    "ignore:.*dynamic_axes.*:UserWarning",
    "ignore:.*shares the same shape constraints.*:UserWarning",
    "ignore:.*from_dynamic_axes_to_dynamic_shapes is deprecated.*:DeprecationWarning",
    "ignore:.*isinstance.*treespec.*LeafSpec.*:FutureWarning",
]