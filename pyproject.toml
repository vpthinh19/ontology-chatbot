[project]
name = "ontchatbot"
version = "0.1.0"
description = "Vietnamese academic-procedure chatbot — PhoBERT NER + ontology-grounded retrieval"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "fastapi[standard]",
    "huggingface-hub",
    "transformers",
    "underthesea",
    "owlready2",
    "rapidfuzz",
    "sentencepiece>=0.2.1",
    "tokenizers>=0.22.2",
]

[project.optional-dependencies]
inference = ["onnxruntime"]
train = [
    "torch",
    "accelerate",
    "onnxruntime-gpu",
    "onnxscript",
    "datasets",
    "seqeval",
    "matplotlib",
    "seaborn",
]

[project.scripts]
train = "ontchatbot.scripts.train:main"
evaluate = "ontchatbot.scripts.evaluate:main"
serve = "ontchatbot.scripts.serve:main"
bench_fuzzy = "ontchatbot.scripts.bench_fuzzy:main"
eval_baseline = "ontchatbot.scripts.eval_baseline:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ontchatbot"]

[tool.hatch.build.targets.wheel.force-include]
"resources" = "ontchatbot/resources"

[[tool.uv.index]]
name = "pytorch-cuda"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[tool.uv.sources]
torch = [
    { index = "pytorch-cuda", extra = "train", marker = "sys_platform != 'darwin'" }
]

[dependency-groups]
dev = ["pytest>=9.0.3"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.uv]
package = true
conflicts = [
    [ { extra = "inference" }, { extra = "train" } ],
]
