[project]
name = "ontchatbot"
version = "0.0.4"
description = "Vietnamese academic-procedure chatbot — PhoBERT NER + ontology-grounded retrieval"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "transformers",
    "huggingface-hub",
    "onnxscript",
    "datasets",
    "seqeval",
    "matplotlib",
    "seaborn",
    "underthesea",
    "owlready2",
    "rapidfuzz",
    "fastapi[standard]",
]

[project.optional-dependencies]
cpu = ["torch", "accelerate", "onnxruntime"]
cuda = ["torch", "accelerate", "onnxruntime-gpu"]

[project.scripts]
train = "ontchatbot.scripts.train:main"
evaluate = "ontchatbot.scripts.evaluate:main"
serve = "ontchatbot.scripts.serve:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ontchatbot"]

[tool.hatch.build.targets.wheel.force-include]
"resources" = "ontchatbot/resources"

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[[tool.uv.index]]
name = "pytorch-cuda"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[tool.uv.sources]
torch = [
    { index = "pytorch-cpu", extra = "cpu" },
    { index = "pytorch-cuda", extra = "cuda", marker = "sys_platform != 'darwin'" }
]

[dependency-groups]
dev = ["pytest>=9.0.3"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.uv]
package = true
conflicts = [
    [ { extra = "cpu" }, { extra = "cuda" } ],
]