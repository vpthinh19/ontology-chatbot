[project]
name = "ont-chatbot"
version = "0.1.0"
description = "Vietnamese academic-procedure chatbot — PhoBERT NER + ontology-grounded retrieval"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "torch",
    "transformers",
    "datasets",
    "accelerate",
    "seqeval",
    "scikit-learn",
    "matplotlib",
    "seaborn",
    "underthesea",
    "owlready2",
    "rapidfuzz",
    "fastapi",
    "uvicorn[standard]",
    "pydantic",
]

[project.scripts]
build-dataset = "src.data.build_dataset:main"
train = "src.ner.train:main"
evaluate = "src.ner.evaluate:main"
serve = "src.api.server:main"

[[tool.uv.index]]
name = "pytorch-cu130"
url = "https://download.pytorch.org/whl/cu130"
explicit = true

[tool.uv.sources]
torch = { index = "pytorch-cu130" }

[dependency-groups]
dev = ["pytest>=9.0.3"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.uv]
package = true