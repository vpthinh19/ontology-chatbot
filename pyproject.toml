[project]
name = "ontchatbot"
version = "0.0.1"
description = "Vietnamese academic-procedure chatbot — PhoBERT NER + ontology-grounded retrieval"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "torch",
    "transformers",
    "datasets",
    "accelerate",
    "seqeval",
    "scikit-learn",
    "matplotlib",
    "seaborn",
    "underthesea",
    "owlready2",
    "rapidfuzz",
    "fastapi[standard]",
]

[project.scripts]
train = "ontchatbot.scripts.train:main"
evaluate = "ontchatbot.scripts.evaluate:main"
serve = "ontchatbot.scripts.serve:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ontchatbot"]

[tool.hatch.build.targets.wheel.force-include]
"resources" = "ontchatbot/resources"

[[tool.uv.index]]
name = "pytorch-cu130"
url = "https://download.pytorch.org/whl/cu130"
explicit = true

[tool.uv.sources]
torch = { index = "pytorch-cu130" }

[dependency-groups]
dev = ["pytest>=9.0.3"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.uv]
package = true
